name: Count action users

# Counts how many workflow files across GitHub reference this action
# (GitHub code search), and writes a shields.io endpoint JSON that the
# README "used by" badge renders. Same method as the count-action-users
# Marketplace action: https://github.com/marketplace/actions/count-action-users
#
# Note: counts workflow FILES, not unique repos, and includes this repo +
# forks. It is a proxy for adoption.

on:
  schedule:
    - cron: '0 4 * * 1'   # weekly, Mondays 04:00 UTC
  workflow_dispatch:        # run on demand to populate the badge immediately

permissions:
  contents: write           # the action commits the generated badge JSON

jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate "used by" badge endpoint
        uses: cicirello/count-action-users@v1
        with:
          action-list: trustabl/trustabl-action
          target-directory: .github/badges
          commit-and-push: true
          color: blue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

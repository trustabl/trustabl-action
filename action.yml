name: Trustabl
description: >-
  Static reliability/safety scanner for AI agent repos (Claude, OpenAI,
  Google ADK, MCP). Inline PR annotations + Security tab, a sticky PR comment,
  CI gating, and a readiness panel.
author: trustabl
branding:
  icon: shield
  color: blue

inputs:
  # ── what to scan ────────────────────────────────────────────────────────
  target:
    description: Path or GitHub URL to scan. Defaults to the caller's checkout root.
    required: false
    default: "."
  version:
    description: trustabl release version (e.g. v0.5.0) or 'latest'.
    required: false
    default: latest
  detectors:
    description: Comma-separated SDK detectors (claude_sdk,openai_sdk,google_adk,openshell). Empty = all.
    required: false
    default: ""
  strict:
    description: Pass --strict (fail on any finding regardless of severity).
    required: false
    default: "false"
  rules-ref:
    description: Pin trustabl-rules git ref. Empty = engine default.
    required: false
    default: ""
  rules-repo:
    description: Override trustabl-rules source repo (owner/name or URL).
    required: false
    default: ""

  # ── outputs / artifacts ─────────────────────────────────────────────────
  upload-sarif:
    description: >-
      Upload SARIF to GitHub Code Scanning (Security tab + inline PR alerts).
      Requires `permissions: security-events: write`. Private repos additionally
      need GitHub Advanced Security; fork PRs get a read-only token. When upload
      is not permitted the action degrades to inline annotations and warns —
      it does not fail the job.
    required: false
    default: "true"
  sarif-file:
    description: Path to write SARIF output.
    required: false
    default: trustabl.sarif
  json-file:
    description: Path to write the full JSON ScanResult.
    required: false
    default: trustabl.json
  upload-artifact:
    description: Upload the JSON + SARIF results as a downloadable workflow artifact.
    required: false
    default: "true"
  artifact-name:
    description: Name of the uploaded artifact.
    required: false
    default: trustabl-scan-results
  artifact-retention-days:
    description: How many days to keep the artifact (1-90). Empty = repo default.
    required: false
    default: ""

  # ── PR surfaces ─────────────────────────────────────────────────────────
  comment-on-pr:
    description: >-
      Post/update a sticky summary comment on the pull request. Requires
      `permissions: pull-requests: write`. No-op outside pull_request events;
      degrades to a warning on fork PRs (read-only token).
    required: false
    default: "true"
  annotations:
    description: Emit inline annotations for findings (on the PR diff for pull_request events).
    required: false
    default: "true"
  max-annotations:
    description: Maximum inline annotations to emit (worst-severity first).
    required: false
    default: "10"

  # ── gating ──────────────────────────────────────────────────────────────
  risk-score-threshold:
    description: >-
      Fail the job when the risk score (100 - readiness) is >= this number.
      Range 0-100. Default 0 = disabled.
    required: false
    default: "0"
  severity-threshold:
    description: >-
      Fail the job when any finding's severity is >= this level.
      One of: none | low | medium | high | critical. Default 'none' = disabled.
    required: false
    default: "none"

  # ── misc ────────────────────────────────────────────────────────────────
  branch:
    description: Branch label for the report. Auto-detected from the checkout when empty.
    required: false
    default: ""
  github-token:
    description: Token used for release lookup, SARIF upload, and PR comments.
    required: false
    default: ${{ github.token }}

  # ── enrich ──────────────────────────────────────────────────────────────
  enrich:
    description: Run AI enrichment on findings (explanations + fixes). Requires llm-key.
    required: false
    default: "false"
  llm-provider:
    description: LLM provider for enrichment (e.g. anthropic). Defaults to anthropic.
    required: false
    default: "anthropic"
  llm-key:
    description: API key for the LLM provider (BYOK). Required when enrich is true.
    required: false
    default: ""
  auto-enrich:
    description: Apply AI-generated fixes to source files. Requires enrich true.
    required: false
    default: "false"
  create-fix-pr:
    description: Open a PR with applied fixes. Requires auto-enrich true.
    required: false
    default: "false"
  enrich-model:
    description: Claude model to use for enrichment (e.g. claude-sonnet-4-6). Defaults to the trustabl binary default (claude-haiku-4-5).
    required: false
    default: ""
  enrich-rules:
    description: Comma-separated rule IDs to enrich (e.g. ADK-201,ADK-105). Empty = all findings.
    required: false
    default: ""
  fix-pr-base:
    description: Base branch for the fix PR. Defaults to the branch being scanned.
    required: false
    default: ""


outputs:
  exit-code:
    description: trustabl native exit code (0 clean, 1 findings, 2 error).
  readiness-score:
    description: Readiness score as an integer percent in [0, 100], higher = better.
  risk-score:
    description: Risk score = 100 - readiness-score. Integer in [0, 100], higher = worse.
  max-severity:
    description: Highest severity present in findings (none if no findings).
  findings-count:
    description: Total finding count.
  sarif-file:
    description: Path to the emitted SARIF file.
  json-file:
    description: Path to the emitted JSON ScanResult file.
  artifact-name:
    description: Name of the uploaded artifact (when upload-artifact is true).
  sarif-uploaded:
    description: Whether the SARIF was accepted by Code Scanning (true/false).
  enrich-json-file:
    description: Path to enriched.json (when enrich is true).
  fix-pr-url:
    description: URL of the opened fix PR (when create-fix-pr is true).

runs:
  using: node20
  main: dist/index.js

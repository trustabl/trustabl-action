name: Trustabl
description: Static reliability/safety scanner for AI agent repos (Claude, OpenAI, Google ADK, MCP). Gates CI on risk + severity.
author: trustabl
branding:
  icon: shield
  color: blue

inputs:
  target:
    description: Path or GitHub URL to scan. Defaults to the caller's checkout root.
    required: false
    default: "."
  version:
    description: trustabl release version (e.g. v0.5.0) or 'latest'.
    required: false
    default: latest
  detectors:
    description: Comma-separated SDK detectors (claude_sdk,openai_sdk,google_adk). Empty = all.
    required: false
    default: ""
  strict:
    description: Pass --strict (fail on any finding regardless of severity).
    required: false
    default: "false"
  rules-ref:
    description: Pin trustabl-rules git ref. Empty = action default.
    required: false
    default: ""
  rules-repo:
    description: Override trustabl-rules source repo (owner/name or URL).
    required: false
    default: ""
  upload-sarif:
    description: |
      Upload trustabl.sarif to GitHub Code Scanning.
      Default disabled because trustabl's current SARIF output is missing the
      required `artifactChanges` property on `fixes[]` and is rejected by the
      Code Scanning schema validator. Flip to "true" once the upstream
      emitter is fixed.
    required: false
    default: "false"
  sarif-file:
    description: Path to write SARIF output.
    required: false
    default: trustabl.sarif
  json-file:
    description: Path to write the full JSON ScanResult. Uploaded as an artifact when upload-artifact is true.
    required: false
    default: trustabl.json
  upload-artifact:
    description: Upload the JSON (and SARIF) scan result as a workflow artifact so it can be downloaded from the run page.
    required: false
    default: "true"
  artifact-name:
    description: Name of the uploaded artifact.
    required: false
    default: trustabl-scan-results
  artifact-retention-days:
    description: How many days the artifact is kept (1-90). Empty = repo default.
    required: false
    default: ""
  risk-score-threshold:
    description: |
      Fail the job when the computed risk score (100 - readiness-score) is
      greater than or equal to this number. Range 0-100. Default 0 = disabled
      (never fails on score). Example: 70 means "fail if risk >= 70".
    required: false
    default: "0"
  severity-threshold:
    description: |
      Fail the job when ANY finding's severity is >= this level.
      One of: none | low | medium | high | critical. Default 'none' = disabled.
      Independent of --strict and the built-in medium-default exit code; this
      input overrides the final exit code only when it triggers a failure.
    required: false
    default: "none"
  branch:
    description: |
      Branch label for the scan run (used in SARIF category and logs).
      If empty, auto-detected from the checkout — preferring main, then master,
      then whatever HEAD points at. Caller may pin explicitly (e.g. develop).
    required: false
    default: ""

outputs:
  sarif-file:
    description: Path to the emitted SARIF file.
    value: ${{ inputs.sarif-file }}
  json-file:
    description: Path to the emitted JSON ScanResult file.
    value: ${{ inputs.json-file }}
  exit-code:
    description: trustabl native exit code (0 clean, 1 findings, 2 error).
    value: ${{ steps.scan.outputs.exit-code }}
  readiness-score:
    description: |
      Readiness score as an integer percent in [0, 100], higher = better.
      Scaled from trustabl's `overall_score` (a float in [0.0, 1.0]).
      Bounds enforced by trustabl's scoring formula: max(0, 1 - weighted/saturation).
    value: ${{ steps.scan.outputs.readiness-score }}
  risk-score:
    description: |
      Risk score = 100 - readiness-score. Integer in [0, 100]. Higher = worse.
    value: ${{ steps.scan.outputs.risk-score }}
  max-severity:
    description: Highest severity present in findings (none if no findings).
    value: ${{ steps.scan.outputs.max-severity }}
  findings-count:
    description: Total finding count.
    value: ${{ steps.scan.outputs.findings-count }}
  artifact-name:
    description: Name of the uploaded artifact (when upload-artifact is true).
    value: ${{ inputs.artifact-name }}

runs:
  using: composite
  steps:
    - id: resolve-branch
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        BR="${{ inputs.branch }}"
        TARGET="${{ inputs.target }}"
        if [ -z "$BR" ]; then
          # 1) Remote GitHub URL → ask GH API for default_branch.
          if [[ "$TARGET" =~ ^https?://github\.com/([^/]+/[^/]+?)(\.git)?/?$ ]]; then
            SLUG="${BASH_REMATCH[1]%.git}"
            BR=$(gh api "repos/$SLUG" --jq .default_branch 2>/dev/null || true)
          fi
          # 2) Local git checkout → prefer main, then master, then HEAD.
          if [ -z "$BR" ] && { [ -d "$TARGET/.git" ] || git -C "$TARGET" rev-parse --git-dir >/dev/null 2>&1; }; then
            if   git -C "$TARGET" show-ref --verify --quiet refs/heads/main;   then BR=main
            elif git -C "$TARGET" show-ref --verify --quiet refs/heads/master; then BR=master
            else BR=$(git -C "$TARGET" rev-parse --abbrev-ref HEAD 2>/dev/null || true)
            fi
          fi
          # 3) Last resort.
          [ -z "$BR" ] && BR=unknown
        fi
        echo "branch=$BR" >> "$GITHUB_OUTPUT"
        echo "Trustabl scanning branch: $BR"

    - id: resolve-version
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        VER="${{ inputs.version }}"
        if [ "$VER" = "latest" ]; then
          VER=$(gh release view --repo trustabl/trustabl --json tagName -q .tagName)
        fi
        echo "version=$VER" >> "$GITHUB_OUTPUT"

    - id: install
      shell: bash
      env:
        VERSION: ${{ steps.resolve-version.outputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        VNUM="${VERSION#v}"
        case "${RUNNER_OS}" in
          Linux)   OS=linux;   EXT=tar.gz ;;
          macOS)   OS=darwin;  EXT=tar.gz ;;
          Windows) OS=windows; EXT=zip ;;
          *) echo "Unsupported RUNNER_OS=$RUNNER_OS"; exit 1 ;;
        esac
        case "${RUNNER_ARCH}" in
          X64)   ARCH=amd64 ;;
          ARM64) ARCH=arm64 ;;
          *) echo "Unsupported RUNNER_ARCH=$RUNNER_ARCH"; exit 1 ;;
        esac
        ASSET="trustabl_${VNUM}_${OS}_${ARCH}.${EXT}"
        DEST="${RUNNER_TEMP}/trustabl"
        mkdir -p "$DEST"
        # `gh release download` hits the REST API asset endpoint with
        # Accept: application/octet-stream — the documented path that
        # increments the per-asset download counter on trustabl/trustabl.
        gh release download "$VERSION" \
          --repo trustabl/trustabl \
          --pattern "$ASSET" \
          --dir "$DEST"
        if [ "$EXT" = "zip" ]; then
          unzip -q "${DEST}/${ASSET}" -d "$DEST"
        else
          tar -xzf "${DEST}/${ASSET}" -C "$DEST"
        fi
        echo "$DEST" >> "$GITHUB_PATH"

    - id: scan
      shell: bash
      env:
        TRUSTABL_RULES_REPO: ${{ inputs.rules-repo }}
        BRANCH: ${{ steps.resolve-branch.outputs.branch }}
      run: |
        set +e
        TARGET="${{ inputs.target }}"

        # Resolve the repo label (used in the report box + step summary).
        # Priority: explicit GitHub URL → target's git remote → caller's repo.
        REPO=""
        if [[ "$TARGET" =~ ^https?://github\.com/([^/]+/[^/]+)(\.git)?/?$ ]]; then
          REPO="${BASH_REMATCH[1]%.git}"
        elif [ -d "$TARGET/.git" ] || git -C "$TARGET" rev-parse --git-dir >/dev/null 2>&1; then
          REMOTE=$(git -C "$TARGET" config --get remote.origin.url 2>/dev/null || true)
          if [[ "$REMOTE" =~ github\.com[:/]([^/]+/[^/]+?)(\.git)?$ ]]; then
            REPO="${BASH_REMATCH[1]%.git}"
          fi
        fi
        [ -z "$REPO" ] && REPO="${{ github.repository }}"
        [ -z "$REPO" ] && REPO="$TARGET"

        BASE_ARGS=(scan "${{ inputs.target }}")
        [ -n "${{ inputs.detectors }}" ] && BASE_ARGS+=(--detectors "${{ inputs.detectors }}")
        [ "${{ inputs.strict }}"     = "true" ] && BASE_ARGS+=(--strict)
        [ -n "${{ inputs.rules-ref }}" ] && BASE_ARGS+=(--rules-ref "${{ inputs.rules-ref }}")

        # Run 1: SARIF (file emit + upload).
        trustabl "${BASE_ARGS[@]}" --format sarif > "${{ inputs.sarif-file }}"
        NATIVE_CODE=$?

        # Run 2: JSON (drives threshold gates, log summary, downloadable artifact).
        # Written into the workspace so actions/upload-artifact can pick it up.
        JSON_FILE="${{ inputs.json-file }}"
        trustabl "${BASE_ARGS[@]}" --format json > "$JSON_FILE" || true

        # trustabl's overall_score is a float in [0.0, 1.0] (per scoring.go).
        # We scale to [0, 100] integers so thresholds and the display are
        # intuitive ("X / 100"). Default 1.0 when JSON missing = clean scan.
        RAW_SCORE=$(jq -r '.overall_score // 1' "$JSON_FILE")
        SCORE=$(awk -v s="$RAW_SCORE" 'BEGIN{ v = s*100; if (v<0) v=0; if (v>100) v=100; printf "%d", v + 0.5 }')
        RISK=$(( 100 - SCORE ))
        COUNT=$(jq -r '.findings | length // 0' "$JSON_FILE")
        MAX_SEV=$(jq -r '
          [.findings[].severity] as $s
          | if ($s|length)==0 then "none"
            elif any($s[]; .=="critical") then "critical"
            elif any($s[]; .=="high")     then "high"
            elif any($s[]; .=="medium")   then "medium"
            elif any($s[]; .=="low")      then "low"
            else "info" end
        ' "$JSON_FILE")

        echo "exit-code=$NATIVE_CODE"   >> "$GITHUB_OUTPUT"
        echo "readiness-score=$SCORE"   >> "$GITHUB_OUTPUT"
        echo "risk-score=$RISK"         >> "$GITHUB_OUTPUT"
        echo "max-severity=$MAX_SEV"    >> "$GITHUB_OUTPUT"
        echo "findings-count=$COUNT"    >> "$GITHUB_OUTPUT"

        # ── Projected readiness (estimate — re-applies trustabl's own scoring) ──
        # Upstream model (scoring.go / models.go): per-tool score = max(0, 1 -
        # weighted/3); overall = min over tools; per-finding weight =
        # severityWeight*confidence (crit 1, high .7, med .4, low .15, info .05).
        # We re-apply that exact formula with selected severities "resolved" to
        # project headroom. NOT a re-scan: assumes each fixed finding is removed
        # cleanly and introduces nothing new. P_* are 0-100 ints like SCORE.
        PROJ_JQ='
          def sw($s): if $s=="critical" then 1.0 elif $s=="high" then 0.7 elif $s=="medium" then 0.4 elif $s=="low" then 0.15 else 0.05 end;
          def removed($rm): reduce (.findings[]? | select(.severity as $s | $rm | index($s))) as $f ({}; .[$f.tool_name] = ((.[$f.tool_name] // 0) + (sw($f.severity) * $f.confidence)));
          def projected($rm): removed($rm) as $r | [ .readiness[]? | (.weighted_severity - (($r[.tool_name]) // 0)) as $w | (if $w<0 then 0 else $w end) as $w2 | (1 - $w2/3.0) as $s | (if $s<0 then 0 else $s end) ] | (if length==0 then 1 else min end);
          def p100($x): ($x*100 + 0.5 | floor);
          [ p100(projected(["critical"])), p100(projected(["critical","high"])), p100(projected(["critical","high","medium"])), p100(projected(["critical","high","medium","low"])), p100(projected(["critical","high","medium","low","info"])) ] | @tsv
        '
        # tr -d '\r': jq on Windows runners can emit CRLF; a trailing \r would
        # poison the $(( )) arithmetic on the P_* values below.
        read P_CRIT P_CH P_CHM P_CHML P_ALL < <(jq -r "$PROJ_JQ" "$JSON_FILE" 2>/dev/null | tr -d '\r')
        : "${P_CRIT:=$SCORE}"; : "${P_CH:=$SCORE}"; : "${P_CHM:=$SCORE}"; : "${P_CHML:=$SCORE}"; : "${P_ALL:=100}"
        # Per-severity finding counts for the breakdown rows.
        read SEV_CRIT SEV_HIGH SEV_MED SEV_LOW SEV_INFO < <(jq -r '[.findings[]?.severity] as $s | "\([$s[]|select(.=="critical")]|length)\t\([$s[]|select(.=="high")]|length)\t\([$s[]|select(.=="medium")]|length)\t\([$s[]|select(.=="low")]|length)\t\([$s[]|select(.=="info")]|length)"' "$JSON_FILE" 2>/dev/null | tr -d '\r')
        : "${SEV_CRIT:=0}"; : "${SEV_HIGH:=0}"; : "${SEV_MED:=0}"; : "${SEV_LOW:=0}"; : "${SEV_INFO:=0}"

        # ── Pretty box-drawn console report ───────────────────────────
        BOLD=$'\e[1m'; DIM=$'\e[2m'; RESET=$'\e[0m'
        FG_RED=$'\e[1;31m'; FG_YEL=$'\e[1;33m'; FG_GRN=$'\e[1;32m'
        FG_BLU=$'\e[1;34m'; FG_CYA=$'\e[1;36m'; FG_MAG=$'\e[1;35m'

        sev_color()  { case "$1" in critical|high) printf '%s' "$FG_RED";; medium) printf '%s' "$FG_YEL";; low) printf '%s' "$FG_BLU";; none) printf '%s' "$FG_GRN";; *) printf '%s' "$DIM";; esac; }
        score_color() { if [ "$1" -ge 70 ] 2>/dev/null; then printf '%s' "$FG_GRN"; elif [ "$1" -ge 40 ] 2>/dev/null; then printf '%s' "$FG_YEL"; else printf '%s' "$FG_RED"; fi; }

        # Geometry: total width 60, left label col 16, right value col 37.
        DASH_TOP=$(printf '─%.0s' {1..58}); DASH_L=$(printf '─%.0s' {1..18}); DASH_R=$(printf '─%.0s' {1..39})
        VAL_W=37

        # Colored cell. Keep VALUES ascii so ${#val} == display width in any
        # locale (the step never sets LANG; the … from trunc only shows on
        # overflow). ANSI escapes are width-0 visually but counted by printf, so
        # we pad manually.
        cell() { local label="$1" color="$2" val="$3" len=${#3} pad; pad=$(( VAL_W - len )); [ $pad -lt 0 ] && pad=0; printf '│ %-16s │ %b%s%b%*s │\n' "$label" "$color" "$val" "$RESET" "$pad" ''; }
        # Bar of <w> glyphs: filled (color) + empty (dim). Padding everywhere uses
        # the known glyph count <w>, never ${#}, so the █/░ multibyte glyphs can
        # never break alignment regardless of locale.
        bar() { local v="$1" m="$2" w="$3" c="$4" f; f=$(awk -v v="$v" -v m="$m" -v w="$w" 'BEGIN{if(m<=0)m=1;n=int(v/m*w+0.5);if(n>w)n=w;if(n<0)n=0;print n}'); printf '%b' "$c"; [ "$f" -gt 0 ] && printf '█%.0s' $(seq 1 "$f"); printf '%b' "$DIM"; [ "$f" -lt "$w" ] && printf '░%.0s' $(seq 1 $((w-f))); printf '%b' "$RESET"; }
        gauge() { local label="$1" v="$2" w="$3" c="$4" suf="$5" b text vis pad; b=$(bar "$v" 100 "$w" "$c"); text="$b $suf"; vis=$(( w + 1 + ${#suf} )); pad=$(( VAL_W - vis )); [ $pad -lt 0 ] && pad=0; printf '│ %-16s │ %b%*s │\n' "$label" "$text$RESET" "$pad" ''; }
        # Count gauge: bar scaled to <max> (not 100) for the severity rows.
        barcell() { local label="$1" v="$2" m="$3" c="$4" suf="$5" b text vis pad w=12; b=$(bar "$v" "$m" "$w" "$c"); text="$b $suf"; vis=$(( w + 1 + ${#suf} )); pad=$(( VAL_W - vis )); [ $pad -lt 0 ] && pad=0; printf '│ %-16s │ %b%*s │\n' "$label" "$text$RESET" "$pad" ''; }
        center() { local t="$1" c="$2" len=${#1} lp rp; lp=$(( (58-len)/2 )); [ $lp -lt 0 ] && lp=0; rp=$(( 58-len-lp )); [ $rp -lt 0 ] && rp=0; printf '%b│%b%*s%b%s%b%*s%b│%b\n' "$FG_CYA" "$RESET" "$lp" '' "$c" "$t" "$RESET" "$rp" '' "$FG_CYA" "$RESET"; }
        # Markdown emoji bar (10 squares) for the Step Summary; colour by band.
        md_emoji() { local v="$1" w=10 f e i out=""; f=$(awk -v v="$v" -v w="$w" 'BEGIN{n=int(v/100*w+0.5);if(n>w)n=w;if(n<0)n=0;print n}'); if [ "$v" -ge 70 ] 2>/dev/null; then e="🟩"; elif [ "$v" -ge 40 ] 2>/dev/null; then e="🟨"; else e="🟥"; fi; for ((i=0;i<f;i++)); do out+="$e"; done; for ((i=f;i<w;i++)); do out+="⬜"; done; printf '%s' "$out"; }
        # Markdown count bar (8 cells, neutral) scaled to <max> for severity rows.
        md_count() { local v="$1" m="$2" w=8 f i out=""; f=$(awk -v v="$v" -v m="$m" -v w="$w" 'BEGIN{if(m<=0)m=1;n=int(v/m*w+0.5);if(n>w)n=w;if(n<0)n=0;print n}'); for ((i=0;i<f;i++)); do out+="▰"; done; for ((i=f;i<w;i++)); do out+="▱"; done; printf '%s' "$out"; }
        # Truncate long values so they never overflow the box.
        trunc() { local s="$1" max="$2"; if [ ${#s} -gt "$max" ]; then printf '%s…' "${s:0:$((max-1))}"; else printf '%s' "$s"; fi; }

        # Projection deltas (points). Cumulative severity tiers, non-decreasing.
        D_ALL=$(( P_ALL - SCORE ))
        L1=$(( P_CRIT - SCORE )); L2=$(( P_CH - P_CRIT )); L3=$(( P_CHM - P_CH )); L4=$(( P_CHML - P_CHM )); L5=$(( P_ALL - P_CHML ))
        SUB=$(trunc "$REPO  -  $BRANCH  -  $COUNT findings" 56)
        SMAX=1; for n in "$SEV_CRIT" "$SEV_HIGH" "$SEV_MED" "$SEV_LOW" "$SEV_INFO"; do [ "$n" -gt "$SMAX" ] 2>/dev/null && SMAX="$n"; done

        echo ""
        printf '%b┌%s┐%b\n' "$FG_CYA" "$DASH_TOP" "$RESET"
        center "TRUSTABL SCAN REPORT" "$BOLD"
        center "$SUB" "$DIM"
        printf '%b├%s┬%s┤%b\n' "$FG_CYA" "$DASH_L" "$DASH_R" "$RESET"
        cell "Repository" "$FG_MAG" "$(trunc "$REPO" "$VAL_W")"
        cell "Branch"     "$FG_CYA" "$(trunc "$BRANCH" "$VAL_W")"
        printf '%b├%s┼%s┤%b\n' "$FG_CYA" "$DASH_L" "$DASH_R" "$RESET"
        gauge "Readiness now"  "$SCORE" 12 "$(score_color "$SCORE")" "$SCORE/100"
        gauge "Projected all"  "$P_ALL" 12 "$(score_color "$P_ALL")" "$P_ALL/100  +$D_ALL"
        printf '%b├%s┼%s┤%b\n' "$FG_CYA" "$DASH_L" "$DASH_R" "$RESET"
        barcell "critical" "$SEV_CRIT" "$SMAX" "$(sev_color critical)" "$SEV_CRIT"
        barcell "high"     "$SEV_HIGH" "$SMAX" "$(sev_color high)"     "$SEV_HIGH"
        barcell "medium"   "$SEV_MED"  "$SMAX" "$(sev_color medium)"   "$SEV_MED"
        barcell "low"      "$SEV_LOW"  "$SMAX" "$(sev_color low)"      "$SEV_LOW"
        barcell "info"     "$SEV_INFO" "$SMAX" "$(sev_color info)"     "$SEV_INFO"
        printf '%b├%s┼%s┤%b\n' "$FG_CYA" "$DASH_L" "$DASH_R" "$RESET"
        cell "Fix critical" "$DIM" "$SCORE -> $P_CRIT  (+$L1)"
        cell "Fix +high"    "$DIM" "$P_CRIT -> $P_CH  (+$L2)"
        cell "Fix +medium"  "$DIM" "$P_CH -> $P_CHM  (+$L3)"
        cell "Fix +low"     "$DIM" "$P_CHM -> $P_CHML  (+$L4)"
        cell "Fix +info"    "$DIM" "$P_CHML -> $P_ALL  (+$L5)"
        printf '%b├%s┼%s┤%b\n' "$FG_CYA" "$DASH_L" "$DASH_R" "$RESET"
        cell "Findings"     "$BOLD" "$COUNT"
        cell "Max severity" "$(sev_color "$MAX_SEV")" "$MAX_SEV"
        cell "Native exit"  "$([ "$NATIVE_CODE" = "0" ] && printf '%s' "$FG_GRN" || printf '%s' "$FG_RED")" "$NATIVE_CODE"
        printf '%b└%s┴%s┘%b\n' "$FG_CYA" "$DASH_L" "$DASH_R" "$RESET"
        printf '%b  Projected = estimate from trustabl'\''s own formula; listed fixes resolved, nothing new. Not a re-scan.%b\n' "$DIM" "$RESET"
        echo ""

        FAIL=0; REASONS=()
        if [ "$NATIVE_CODE" = "2" ]; then FAIL=1; REASONS+=("scanner error (exit 2)"); fi
        if [ "$NATIVE_CODE" = "1" ]; then FAIL=1; REASONS+=("trustabl gated (medium+ or --strict)"); fi

        RST="${{ inputs.risk-score-threshold }}"
        if [ "$RST" -gt 0 ] 2>/dev/null && [ "$RISK" -ge "$RST" ]; then
          FAIL=1; REASONS+=("risk $RISK >= threshold $RST")
        fi

        sev_rank() { case "$1" in critical) echo 4;; high) echo 3;; medium) echo 2;; low) echo 1;; info) echo 0;; *) echo -1;; esac; }
        ST="${{ inputs.severity-threshold }}"
        if [ "$ST" != "none" ] && [ "$ST" != "" ]; then
          if [ "$(sev_rank "$MAX_SEV")" -ge "$(sev_rank "$ST")" ] && [ "$COUNT" -gt 0 ]; then
            FAIL=1; REASONS+=("max severity $MAX_SEV >= threshold $ST")
          fi
        fi

        GREEN=$'\e[1;32m'; RED=$'\e[1;31m'; RESET=$'\e[0m'
        SUMMARY="${GITHUB_STEP_SUMMARY:-/dev/null}"

        {
          echo "## Trustabl scan"
          echo ""
          echo "**\`$REPO\` · \`$BRANCH\` · $COUNT findings**"
          echo ""
          echo "Readiness now &nbsp; $(md_emoji "$SCORE") &nbsp; \`$SCORE / 100\`"
          echo ""
          echo "Projected if **all findings** resolved &nbsp; $(md_emoji "$P_ALL") &nbsp; \`$P_ALL / 100\` &nbsp; **+$D_ALL**"
          echo ""
          echo "### Findings by severity"
          echo ""
          echo "| Severity | Count | |"
          echo "|---|---|---|"
          echo "| critical | $SEV_CRIT | $(md_count "$SEV_CRIT" "$SMAX") |"
          echo "| high | $SEV_HIGH | $(md_count "$SEV_HIGH" "$SMAX") |"
          echo "| medium | $SEV_MED | $(md_count "$SEV_MED" "$SMAX") |"
          echo "| low | $SEV_LOW | $(md_count "$SEV_LOW" "$SMAX") |"
          echo "| info | $SEV_INFO | $(md_count "$SEV_INFO" "$SMAX") |"
          echo ""
          echo "<details><summary><b>Projected headroom</b> — estimate, not a re-scan</summary>"
          echo ""
          echo "| Fix scope | Readiness | Δ |"
          echo "|---|---|---|"
          echo "| Fix critical | $SCORE → $P_CRIT | +$L1 |"
          echo "| + high | $P_CRIT → $P_CH | +$L2 |"
          echo "| + medium | $P_CH → $P_CHM | +$L3 |"
          echo "| + low | $P_CHM → $P_CHML | +$L4 |"
          echo "| + info (all) | $P_CHML → $P_ALL | +$L5 |"
          echo ""
          echo "_Projected by re-applying trustabl's own scoring with the listed findings resolved (nothing new introduced). Confidence inputs are heuristic — treat as guidance, not a guarantee._"
          echo "</details>"
          echo ""
          echo "| Metric | Value |"
          echo "|---|---|"
          echo "| Repository | \`$REPO\` |"
          echo "| Branch | \`$BRANCH\` |"
          echo "| Readiness score | \`$SCORE\` |"
          echo "| Risk score | \`$RISK\` |"
          echo "| Findings | \`$COUNT\` |"
          echo "| Max severity | \`$MAX_SEV\` |"
          echo "| Native exit | \`$NATIVE_CODE\` |"
          echo ""
        } >> "$SUMMARY"

        if [ "$FAIL" = "1" ]; then
          printf '%b\n' "${RED}✗ Failed due to: ${REASONS[*]}${RESET}"
          {
            echo "### ❌ Failed"
            echo ""
            echo "| Gate | Threshold | Detected | Result |"
            echo "|---|---|---|---|"
            if [ -n "$RST" ] && [ "$RST" -gt 0 ] 2>/dev/null; then
              if [ "$RISK" -ge "$RST" ]; then VERDICT="❌ over"; else VERDICT="✅ under"; fi
              echo "| risk-score | \`>= $RST\` | \`$RISK\` | $VERDICT |"
            fi
            if [ "$ST" != "none" ] && [ "$ST" != "" ]; then
              if [ "$(sev_rank "$MAX_SEV")" -ge "$(sev_rank "$ST")" ] && [ "$COUNT" -gt 0 ]; then
                VERDICT="❌ exceeded"
              else
                VERDICT="✅ ok"
              fi
              echo "| severity | \`>= $ST\` | \`$MAX_SEV\` | $VERDICT |"
            fi
            if [ "$NATIVE_CODE" != "0" ]; then
              echo "| trustabl native | \`exit 0\` | \`exit $NATIVE_CODE\` | ❌ |"
            fi
            echo ""
            printf '**Failed due to:** %s\n' "${REASONS[*]}"
          } >> "$SUMMARY"
          exit 1
        fi

        printf '%b\n' "${GREEN}✓ Successfully passed scanning${RESET}"
        echo "### ✅ Successfully passed scanning" >> "$SUMMARY"
        exit 0

    - if: ${{ always() && inputs.upload-sarif == 'true' && hashFiles(inputs.sarif-file) != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.sarif-file }}
        category: trustabl-${{ steps.resolve-branch.outputs.branch }}

    - if: ${{ always() && inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.json-file }}
          ${{ inputs.sarif-file }}
        if-no-files-found: warn
        retention-days: ${{ inputs.artifact-retention-days }}
